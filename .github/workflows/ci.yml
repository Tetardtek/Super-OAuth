name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop, feature/** ]
  pull_request:
    branches: [ main, develop ]

jobs:
  # Job 1: Tests Backend (Jest)
  test-backend:
    name: Backend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test
        env:
          NODE_ENV: test

      - name: Generate backend coverage report
        run: npm run test:coverage
        continue-on-error: true

  # Job 2: Tests Frontend (Vitest)
  test-frontend:
    name: Frontend Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test:frontend
        env:
          NODE_ENV: test

      - name: Generate frontend coverage report
        run: npm run test:frontend:coverage
        continue-on-error: true

  # Job 3: Code Quality (Linting)
  lint:
    name: Code Quality - Linting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

  # Job 4: Code Quality (Formatting)
  format:
    name: Code Quality - Formatting
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check Prettier formatting
        run: npm run format:check

  # Job 5: TypeScript Type Checking
  typecheck:
    name: TypeScript Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript type checking
        run: npm run typecheck

  # Job 6: Build Verification
  build:
    name: Build Verification
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: dist/
          retention-days: 7

  # Job 7: All Tests Summary
  test-summary:
    name: Tests Summary
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, lint, format, typecheck, build]
    if: always()

    steps:
      - name: Check all jobs status
        run: |
          echo "Backend Tests: ${{ needs.test-backend.result }}"
          echo "Frontend Tests: ${{ needs.test-frontend.result }}"
          echo "Linting: ${{ needs.lint.result }}"
          echo "Formatting: ${{ needs.format.result }}"
          echo "Type Checking: ${{ needs.typecheck.result }}"
          echo "Build: ${{ needs.build.result }}"

          if [ "${{ needs.test-backend.result }}" != "success" ] || \
             [ "${{ needs.test-frontend.result }}" != "success" ] || \
             [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.format.result }}" != "success" ] || \
             [ "${{ needs.typecheck.result }}" != "success" ] || \
             [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Some jobs failed!"
            exit 1
          fi

          echo "✅ All jobs passed!"

  # Job 8: Deploy to VPS
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [test-backend, test-frontend, lint, format, typecheck, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 60s
          command_timeout: 20m
          script: |
            set -e
            cd /home/tetardtek/github/Super-OAuth
            git pull origin main
            npm ci
            npm run build
            # Frontend SvelteKit build (static assets served by Express)
            cd frontend
            npm ci --no-audit --no-fund
            npm run build
            cd ..
            MYSQL_HOST=172.17.0.1 npm run migration:run:prod
            # pm2 runs under deploy user (owns PM2 God process for all VPS apps)
            # sudoers rule /etc/sudoers.d/super-oauth-deploy grants this exact command NOPASSWD
            sudo -n -u deploy /usr/local/bin/pm2 reload super-oauth --update-env
            echo "Deploy complete"
